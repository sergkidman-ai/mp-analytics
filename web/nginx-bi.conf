# Применить ПОСЛЕ того как bi.metaverseworld.ru → 155.212.189.66 (A-запись).
# Установка: cp web/nginx-bi.conf /etc/nginx/sites-available/bi.metaverseworld.ru
#   htpasswd -c /etc/nginx/.htpasswd-bi <user>   # пароль для входа
#   ln -s ... sites-enabled/ ; nginx -t ; systemctl reload nginx
#   certbot --nginx -d bi.metaverseworld.ru      # HTTPS (Let's Encrypt)
server {
    listen 80;
    server_name bi.metaverseworld.ru;
    location / {
        auth_basic "Пульт бизнеса";
        auth_basic_user_file /etc/nginx/.htpasswd-bi;
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}
