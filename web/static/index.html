<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Пульт бизнеса — BI маркетплейсов</title>
<style>
  :root{--bg:#0f1720;--card:#172230;--line:#243449;--txt:#e6edf3;--mut:#8aa0b5;--acc:#3fa7ff;--pos:#37c871;--neg:#ff5d5d}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  header{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  h1{font-size:18px;margin:0}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto;align-items:center}
  select,input{background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font:inherit}
  main{padding:22px;max-width:1200px;margin:0 auto}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .card .lbl{color:var(--mut);font-size:12px}
  .card .val{font-size:22px;font-weight:600;margin-top:4px}
  .muted{color:var(--mut)}.pos{color:var(--pos)}.neg{color:var(--neg)}
  .row{display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin:18px 0 10px}
  .row h2{font-size:15px;margin:0}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th,td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--mut);font-weight:500;cursor:pointer;user-select:none}
  tbody tr:hover{background:#1d2b3c}
  .note{color:var(--mut);font-size:12px;margin:6px 0 0}
  label.chk{display:flex;gap:6px;align-items:center;color:var(--mut);cursor:pointer}
  .sub{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:760px){.sub{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>📊 Пульт бизнеса</h1>
  <div class="filters">
    <select id="f-platform"></select>
    <select id="f-account"></select>
    <select id="f-period"></select>
  </div>
</header>
<main>
  <div class="cards" id="cards"></div>
  <p class="note">Маржа считается по <b>сегодняшней закупке (replacement-cost)</b>. Для распроданного / FBO
     это «сколько заработали бы, закупая сейчас» — для них себестоимость = минимум по группе.</p>

  <div class="row">
    <h2>SKU</h2>
    <label class="chk"><input type="checkbox" id="only-loss"> только убыточные</label>
    <input id="search" placeholder="поиск по nm_id…" style="margin-left:auto">
  </div>
  <table id="sku">
    <thead><tr>
      <th data-s="article">nm_id</th><th data-s="qty">шт</th>
      <th data-s="revenue_buyer">выручка</th><th data-s="cogs">COGS</th>
      <th data-s="logistics">логистика</th><th data-s="net_profit">чистая</th>
      <th data-s="margin_pct">маржа %</th>
    </tr></thead>
    <tbody></tbody>
  </table>

  <div class="sub" style="margin-top:24px">
    <div>
      <div class="row"><h2>⚠️ Топ убыточных</h2></div>
      <table id="loss"><tbody></tbody></table>
    </div>
    <div>
      <div class="row"><h2>📦 Остатки на складах WB (FBO)</h2></div>
      <table id="stocks"><tbody></tbody></table>
    </div>
  </div>
</main>
<script>
const $=s=>document.querySelector(s);
const rub=n=>n==null?'—':Math.round(n).toLocaleString('ru-RU')+' ₽';
const num=n=>n==null?'—':Math.round(n).toLocaleString('ru-RU');
let state={platform:'',account:'',period:'',sort:'revenue_buyer',order:'desc',problem:false,q:''};

async function api(p){const r=await fetch(p);return r.json();}
function qs(){return `platform=${state.platform}&account=${state.account}&period=${state.period}`;}

async function initFilters(){
  const m=await api('/api/meta');
  const plat=[...new Set(m.slices.map(s=>s.platform))];
  const acc=[...new Set(m.slices.map(s=>s.account))];
  const per=[...new Set(m.slices.map(s=>s.period_from))];
  fill('#f-platform',plat,'площадка');fill('#f-account',acc,'аккаунт');fill('#f-period',per,'период');
  state.platform=plat[0]||'';state.account=acc[0]||'';state.period=per[0]||'';
  $('#f-platform').value=state.platform;$('#f-account').value=state.account;$('#f-period').value=state.period;
}
function fill(sel,arr,lbl){const e=$(sel);e.innerHTML=arr.map(v=>`<option value="${v}">${v}</option>`).join('');}

async function loadSummary(){
  const s=await api('/api/summary?'+qs());
  const m=s.margin_pct, mc=m==null?'':(m<0?'neg':'pos');
  $('#cards').innerHTML=[
    ['Выручка',rub(s.revenue)],['Чистая',`<span class="${s.net<0?'neg':'pos'}">${rub(s.net)}</span>`],
    ['Маржа %',`<span class="${mc}">${m==null?'—':m+'%'}</span>`],['COGS',rub(s.cogs)],
    ['Комиссия+логистика',rub(s.commission+s.logistics)],['Продано, шт',num(s.qty)],
    ['SKU',num(s.n_sku)],['Убыточных SKU',`<span class="neg">${num(s.loss_count)}</span>`],
  ].map(([l,v])=>`<div class="card"><div class="lbl">${l}</div><div class="val">${v}</div></div>`).join('');
}
function skuRow(r){const mc=r.net_profit<0?'neg':'pos';
  return `<tr><td>${r.article}</td><td>${num(r.qty)}</td><td>${rub(r.revenue_buyer)}</td>
    <td>${rub(r.cogs)}</td><td>${rub(r.logistics)}</td>
    <td class="${mc}">${rub(r.net_profit)}</td><td class="${mc}">${r.margin_pct==null?'—':r.margin_pct+'%'}</td></tr>`;}
async function loadSku(){
  const d=await api(`/api/sku?${qs()}&problem=${state.problem}&sort=${state.sort}&order=${state.order}&q=${encodeURIComponent(state.q)}`);
  $('#sku tbody').innerHTML=d.rows.map(skuRow).join('')||'<tr><td colspan="7" class="muted">нет данных</td></tr>';
}
async function loadLoss(){
  const d=await api(`/api/sku?${qs()}&problem=true&sort=net_profit&order=asc&limit=5`);
  $('#loss tbody').innerHTML=d.rows.map(r=>`<tr><td>${r.article}</td><td class="neg">${rub(r.net_profit)}</td><td class="muted">${num(r.qty)} шт</td></tr>`).join('')||'<tr><td class="muted">нет</td></tr>';
}
async function loadStocks(){
  const d=await api(`/api/stocks?account=${state.account}`);
  const t=d.total||{};
  let html=`<tr><td><b>Итого</b></td><td><b>${num(t.qty)}</b> шт</td><td class="muted">возвр. в пути ${num(t.returns)}</td></tr>`;
  html+=(d.by_subject||[]).map(s=>`<tr><td>${s.subject||'—'}</td><td>${num(s.qty)} шт</td><td class="muted">возвр ${num(s.returns)}</td></tr>`).join('');
  $('#stocks tbody').innerHTML=html;
}
async function refresh(){await Promise.all([loadSummary(),loadSku(),loadLoss(),loadStocks()]);}

['f-platform','f-account','f-period'].forEach(id=>$('#'+id).onchange=e=>{
  state[id.split('-')[1]]=e.target.value;refresh();});
$('#only-loss').onchange=e=>{state.problem=e.target.checked;loadSku();};
$('#search').oninput=e=>{state.q=e.target.value;clearTimeout(window._t);window._t=setTimeout(loadSku,300);};
document.querySelectorAll('#sku th').forEach(th=>th.onclick=()=>{
  const s=th.dataset.s;if(!s)return;
  if(state.sort===s)state.order=state.order==='asc'?'desc':'asc';else{state.sort=s;state.order='asc';}
  loadSku();});

(async()=>{await initFilters();await refresh();})();
</script>
</body>
</html>
